{% extends "base.html" %}
{% block title %}Admin login — Sky.EcoAI{% endblock %}
{% block content %}

<div class="auth-wrapper">
  <div class="glass-card auth-card">
    <span class="tag" style="margin-bottom:14px;">Restricted access</span>
    <h1>Admin console</h1>
    <p>This is a separate credential space from regular user accounts.</p>

    <div class="form-error-banner" id="adminLoginError"></div>

    <form id="adminLoginForm" novalidate>
      <div class="input-group">
        <label for="adminEmail">Admin email</label>
        <input type="email" id="adminEmail" placeholder="admin@sky-ecoai.local" required>
      </div>
      <div class="input-group">
        <label for="adminPassword">Password</label>
        <div class="input-with-icon">
          <input type="password" id="adminPassword" placeholder="••••••••" required>
          <button type="button" class="input-icon-btn" data-toggle-for="adminPassword">👁</button>
        </div>
      </div>
      <button type="submit" class="primary-btn" style="width:100%;" id="adminLoginSubmit">Enter console</button>
    </form>

    <p class="auth-footer-note">Not an admin? <a href="/login">Go to regular login</a></p>
  </div>
</div>

{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/admin.js') }}"></script>
{% endblock %}
